name: PR Preview Deploy

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true

env:
  PROJECT_ID: racingvacing
  REGION: asia-south1
  SERVICE: raceservice

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build \
            -t asia-south1-docker.pkg.dev/$PROJECT_ID/app-images/$SERVICE:${GITHUB_SHA} .

      - name: Push Docker Image
        run: |
          docker push \
            asia-south1-docker.pkg.dev/$PROJECT_ID/app-images/$SERVICE:${GITHUB_SHA}

      - name: Deploy Preview Service
        run: |
          gcloud run deploy ${SERVICE}-pr-${{ github.event.inputs.pr_number }} \
            --image asia-south1-docker.pkg.dev/$PROJECT_ID/app-images/$SERVICE:${GITHUB_SHA} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances racingvacing:asia-south1:my-postgres \
            --set-env-vars POSTGRES_HOST=/cloudsql/racingvacing:asia-south1:my-postgres \
            --set-env-vars POSTGRES_DB=raceservice \
            --set-env-vars POSTGRES_USER=postgres \
            --set-env-vars POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

      - name: Get Preview URL
        id: preview-url
        run: |
          URL=$(gcloud run services describe ${SERVICE}-pr-${{ github.event.inputs.pr_number }} \
            --region=$REGION \
            --format='value(status.url)')

          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          URL=${{ steps.preview-url.outputs.url }}

          echo "Checking health at $URL/health"

          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")

            if [ "$STATUS" = "200" ]; then
              echo "Preview deployment healthy"
              exit 0
            fi

            echo "Waiting for healthy deployment..."
            sleep 10
          done

          echo "Deployment unhealthy"
          exit 1