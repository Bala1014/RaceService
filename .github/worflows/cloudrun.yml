name: CI + CD

on:
  pull_request:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  SERVICE: raceservice
  REGION: asia-south1

jobs:

# 🧪 PR validation
  ci:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build

---

# 🚀 Main: build + push + deploy
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build

      - name: Build Docker image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE:$TAG .

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Push image
        run: |
          docker push gcr.io/$PROJECT_ID/$SERVICE:$TAG

      - name: Deploy to Cloud Run
        run: |
          - name: Deploy to Cloud Run
  run: |
    gcloud run deploy $SERVICE \
      --image gcr.io/$PROJECT_ID/$SERVICE:$TAG \
      --region $REGION \
      --platform managed \
      --allow-unauthenticated \
      --add-cloudsql-instances racingvacing:asia-south1:my-postgres \
      --set-env-vars POSTGRES_HOST=/cloudsql/racingvacing:asia-south1:my-postgres,POSTGRES_DB=raceservice,POSTGRES_USER=postgres,POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}