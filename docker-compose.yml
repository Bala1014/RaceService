services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: raceservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bala99
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - raceservice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  raceservice-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: raceservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bala99
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - raceservice-network

  raceservice-gateway:
    build:
      context: .
      dockerfile: Dockerfile.Gateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - raceservice-api
    networks:
      - raceservice-network

networks:
  raceservice-network:
    driver: bridge

volumes:
  postgres-data:
